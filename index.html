<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎓 Graduation Gift</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="sibling-gift.css"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: #3a3830;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Quicksand', sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 24px;
    overflow-x: hidden;
  }

  /* ── HERO TEXT (screenshot style) ── */
  .hero {
    text-align: center;
    margin-bottom: 56px;
    opacity: 0;
    transform: translateY(-20px);
    animation: fadeDown 0.9s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
  }
  @keyframes fadeDown {
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 10vw, 6rem);
    font-weight: 700;
    color: #c9a84c;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
    /* Gold foil effect */
    background: linear-gradient(
      135deg,
      #b8860b 0%,
      #f0d060 20%,
      #c9a84c 35%,
      #ffe680 50%,
      #c9a84c 65%,
      #f0d060 80%,
      #b8860b 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    background-size: 200% 200%;
    animation: goldShimmer 4s ease-in-out infinite;
  }
  @keyframes goldShimmer {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .hero-divider {
    width: 85%;
    height: 3px;
    margin: 18px auto;
    background: linear-gradient(90deg, transparent, #c9a84c, #ffe680, #c9a84c, transparent);
    border-radius: 999px;
    position: relative;
  }
  .hero-divider::before {
    content: '';
    position: absolute;
    inset: -1px;
    background: linear-gradient(90deg, transparent, rgba(255,230,128,0.6), transparent);
    border-radius: 999px;
    filter: blur(4px);
  }

  .hero-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 3.5vw, 1.6rem);
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #c9a84c;
    opacity: 0.85;
  }

  /* ── COIN SECTION ── */
  .coin-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: fadeUp 0.8s ease 1s forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; }
  }

  .coin-label {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.6);
    margin-bottom: 4px;
  }

  /* ── TIP BUTTON ── */
  .tip-button {
    background: none;
    border: 0;
    border-radius: 0.25rem 0.25rem 0 0;
    cursor: pointer;
    font-family: "Quicksand", sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    height: 3rem;
    margin-bottom: -4rem;
    outline: 0;
    position: relative;
    top: 0;
    transform-origin: 0% 100%;
    transition: transform 50ms ease-in-out;
    width: 11rem;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.06em;
  }
  .tip-button:active { transform: rotate(4deg); }
  .tip-button.clicked {
    animation: 150ms ease-in-out 1 shake;
    pointer-events: none;
  }
  .tip-button.clicked .tip-button__text {
    opacity: 0;
    transition: opacity 100ms linear 200ms;
  }
  .tip-button.clicked::before {
    height: 0.5rem;
    width: 60%;
  }
  .tip-button.clicked .coin {
    transition: margin-bottom 1s linear 200ms;
    margin-bottom: 0;
  }
  .tip-button.shrink-landing::before {
    transition: width 200ms ease-in;
    width: 0;
  }
  /* QR reveal instead of "Thank you!" */
  .tip-button.coin-landed::after {
    opacity: 1;
    transform: scale(1);
    transform-origin: 50% 100%;
  }
  .tip-button.coin-landed .coin-wrapper {
    background: radial-gradient(circle at 35% 97%, rgba(58,56,48,0.4) 0.04rem, transparent 0.04rem),
                radial-gradient(circle at 45% 92%, rgba(58,56,48,0.4) 0.04rem, transparent 0.02rem),
                radial-gradient(circle at 55% 98%, rgba(58,56,48,0.4) 0.04rem, transparent 0.04rem),
                radial-gradient(circle at 65% 96%, rgba(58,56,48,0.4) 0.06rem, transparent 0.06rem);
    background-position: center bottom;
    background-size: 100%;
    bottom: -1rem;
    opacity: 0;
    transform: scale(2) translateY(-10px);
  }

  .tip-button__text {
    color: #3a3830;
    margin-right: 1.8rem;
    opacity: 1;
    position: relative;
    transition: opacity 100ms linear 500ms;
    z-index: 3;
    text-shadow: none;
  }

  /* Gold button base */
  .tip-button::before {
    background: linear-gradient(135deg, #b8860b, #f0d060, #c9a84c, #ffe680, #c9a84c);
    background-size: 200% 200%;
    animation: goldShimmer 3s ease-in-out infinite;
    border-radius: 0.25rem;
    bottom: 0; left: 50%;
    content: "";
    display: block;
    height: 100%;
    position: absolute;
    transform: translateX(-50%);
    transition: height 250ms ease-in-out 400ms, width 250ms ease-in-out 300ms;
    width: 100%;
    z-index: 2;
    box-shadow: 0 4px 20px rgba(201,168,76,0.5), 0 0 40px rgba(201,168,76,0.2);
  }

  /* QR popup instead of "Thank you!" */
  .tip-button::after {
    bottom: -13rem;
    content: "";
    height: 12rem;
    width: 12rem;
    left: 50%;
    transform: translateX(-50%) scale(0);
    opacity: 0;
    position: absolute;
    pointer-events: none;
    background-image: url('gcash_qr_code.png');
    background-size: cover;
    background-position: center;
    border-radius: 16px;
    border: 3px solid #c9a84c;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.3);
    transform-origin: 50% 20%;
    transition: transform 300ms cubic-bezier(0, 0, 0.35, 1.43), opacity 200ms ease;
    z-index: 20;
  }
  .tip-button.coin-landed::after {
    opacity: 1;
    transform: translateX(-50%) scale(1);
  }

  .coin-wrapper {
    background: none;
    bottom: 0; left: 0;
    height: 18rem;
    opacity: 1; overflow: hidden;
    pointer-events: none;
    position: absolute;
    transform: none;
    transform-origin: 50% 100%;
    transition: opacity 200ms linear 100ms, transform 300ms ease-out;
    width: 100%;
  }

  /* ── GOLD COIN ── */
  .coin {
    --front-y-multiplier: 0;
    --back-y-multiplier: 0;
    --coin-y-multiplier: 0;
    --coin-x-multiplier: 0;
    --coin-scale-multiplier: 0;
    --coin-rotation-multiplier: 0;
    --shine-opacity-multiplier: 0.4;
    --shine-bg-multiplier: 50%;
    bottom: calc(var(--coin-y-multiplier) * 1rem - 3.5rem);
    height: 3.5rem;
    margin-bottom: 3.05rem;
    position: absolute;
    right: calc(var(--coin-x-multiplier) * 34% + 16%);
    transform: translateX(50%) scale(calc(0.4 + var(--coin-scale-multiplier))) rotate(calc(var(--coin-rotation-multiplier) * -1deg));
    transition: opacity 100ms linear 200ms;
    width: 3.5rem;
    z-index: 3;
  }
  .coin__front, .coin__middle, .coin__back, .coin::before, .coin__front::after, .coin__back::after {
    border-radius: 50%;
    box-sizing: border-box;
    height: 100%; left: 0;
    position: absolute; width: 100%; z-index: 3;
  }

  /* Gold front face with ₱ symbol */
  .coin__front {
    background:
      radial-gradient(circle at 50% 50%, transparent 50%, rgba(184,134,11,0.5) 54%, #c9a84c 54%),
      linear-gradient(210deg, #ffe680 32%, transparent 32%),
      linear-gradient(150deg, #ffe680 32%, transparent 32%),
      linear-gradient(to right, #ffe680 22%, transparent 22%, transparent 78%, #ffe680 78%),
      linear-gradient(to bottom, #fff7cc 44%, transparent 44%, transparent 65%, #fff7cc 65%, #fff7cc 71%, #ffe680 71%),
      linear-gradient(to right, transparent 28%, #fff7cc 28%, #fff7cc 34%, #ffe680 34%, #ffe680 40%, #fff7cc 40%, #fff7cc 47%, #ffe680 47%, #ffe680 53%, #fff7cc 53%, #fff7cc 60%, #ffe680 60%, #ffe680 66%, #fff7cc 66%, #fff7cc 72%, transparent 72%);
    background-color: #d4a017;
    background-size: 100% 100%;
    transform: translateY(calc(var(--front-y-multiplier) * 0.3181818182rem / 2)) scaleY(var(--front-scale-multiplier));
    display: flex; align-items: center; justify-content: center;
  }
  .coin__front::after {
    background: rgba(0,0,0,0.15);
    content: "";
    opacity: var(--front-y-multiplier);
  }

  /* ₱ symbol overlay on front */
  .coin__front .peso-sign {
    position: absolute;
    font-size: 1.4rem;
    font-weight: 900;
    color: rgba(255,247,204,0.95);
    z-index: 10;
    text-shadow: 0 1px 2px rgba(100,70,0,0.5);
    font-family: 'Cormorant Garamond', serif;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .coin__middle {
    background: linear-gradient(to right, #b8860b, #c9a84c, #ffe680, #c9a84c, #b8860b);
    transform: translateY(calc(var(--middle-y-multiplier) * 0.3181818182rem / 2)) scaleY(var(--middle-scale-multiplier));
  }

  /* Gold back face */
  .coin__back {
    background:
      radial-gradient(circle at 50% 50%, transparent 50%, rgba(184,134,11,0.5) 54%, #c9a84c 54%),
      radial-gradient(circle at 50% 40%, #fff7cc 23%, transparent 23%),
      radial-gradient(circle at 50% 100%, #fff7cc 35%, transparent 35%);
    background-color: #d4a017;
    background-size: 100% 100%;
    transform: translateY(calc(var(--back-y-multiplier) * 0.3181818182rem / 2)) scaleY(var(--back-scale-multiplier));
  }
  .coin__back::after {
    background: rgba(0,0,0,0.15);
    content: "";
    opacity: var(--back-y-multiplier);
  }

  .coin::before {
    background:
      radial-gradient(circle at 25% 65%, transparent 50%, rgba(255,255,255,0.9) 90%),
      linear-gradient(55deg, transparent calc(var(--shine-bg-multiplier) + 0%), #fffde0 calc(var(--shine-bg-multiplier) + 0%), transparent calc(var(--shine-bg-multiplier) + 50%));
    content: "";
    opacity: var(--shine-opacity-multiplier);
    transform: translateY(calc(var(--middle-y-multiplier) * 0.3181818182rem / -2)) scaleY(var(--middle-scale-multiplier)) rotate(calc(var(--coin-rotation-multiplier) * 1deg));
    z-index: 10;
  }
  .coin::after {
    background: linear-gradient(to right, #b8860b, #ffe680, #b8860b);
    content: ""; height: 0.3181818182rem;
    left: 0; position: absolute; top: 50%;
    transform: translateY(-50%); width: 100%; z-index: 2;
  }

  /* ── QR CAPTION ── */
  .qr-caption {
    position: absolute;
    bottom: -16rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #c9a84c;
    opacity: 0;
    white-space: nowrap;
    transition: opacity 0.4s ease 0.3s;
    pointer-events: none;
    z-index: 21;
  }
  .tip-button.coin-landed .qr-caption { opacity: 1; }

  /* ── SPACER for QR reveal ── */
  .qr-spacer {
    height: 14rem;
    opacity: 0;
    pointer-events: none;
  }

  @keyframes shake {
    0% { transform: rotate(4deg); }
    66% { transform: rotate(-4deg); }
    100% { transform: rotate(0deg); }
  }

  /* ── CREDITS ── */
  .credits {
    position: fixed;
    bottom: 20px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.4s forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; }
  }
  .credits-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.4);
  }
  .credits-links {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .credits-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: rgba(201,168,76,0.55);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid rgba(201,168,76,0.15);
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .credits-link:hover {
    color: #c9a84c;
    border-color: rgba(201,168,76,0.45);
    background: rgba(201,168,76,0.07);
  }
  .credits-link svg {
    width: 13px; height: 13px;
    fill: currentColor;
    flex-shrink: 0;
  }
  .credits-dot {
    color: rgba(201,168,76,0.2);
    font-size: 0.6rem;
  }
</style>
</head>
<body>

<!-- ── HERO ── -->
<div class="hero">
  <div class="hero-main">Graduation Gift</div>
  <div class="hero-divider"></div>
  <div class="hero-sub">Is Now Officially Open!</div>
</div>

<!-- ── COIN SECTION ── -->
<div class="coin-section">
  <div class="coin-label">Tap the coin to send your gift ✨</div>

  <button class="tip-button" id="tipBtn">
    <span class="tip-button__text">₱ Send a Gift</span>
    <div class="coin-wrapper">
      <div class="coin">
        <div class="coin__middle"></div>
        <div class="coin__back"></div>
        <div class="coin__front">
          <span class="peso-sign">₱</span>
        </div>
      </div>
    </div>
    <!-- QR caption that appears with QR -->
    <div class="qr-caption">Scan to send via GCash 💛</div>
  </button>

  <!-- Spacer so QR has room to appear -->
  <div class="qr-spacer"></div>
</div>

<!-- ── CREDITS ── -->
<div class="credits">
  <div class="credits-label">Made with 💛 by</div>
  <div class="credits-links">
    <!-- Facebook -->
    <a href="https://www.facebook.com/JenxxAi" target="_blank" rel="noopener" class="credits-link">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Facebook
    </a>
    <span class="credits-dot">✦</span>
    <!-- LinkedIn -->
    <a href="https://www.linkedin.com/in/carlos-miguel-torres-2644a9332/" target="_blank" rel="noopener" class="credits-link">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      LinkedIn
    </a>
    <span class="credits-dot">✦</span>
    <!-- GitHub -->
    <a href="https://github.com/JenxxAI" target="_blank" rel="noopener" class="credits-link">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      GitHub
    </a>
  </div>
</div>

<script>
// ── CONFETTI on load ──
window.addEventListener('load', () => {
  setTimeout(() => {
    confetti({
      particleCount: 80,
      spread: 65,
      origin: { y: 0.3 },
      colors: ['#c9a84c', '#ffe680', '#fff7cc', '#ffffff', '#b8860b']
    });
  }, 700);
});

// ── COIN ANIMATION ──
const tipButtons = document.querySelectorAll('.tip-button');

tipButtons.forEach((button) => {
  let coin = button.querySelector('.coin');
  coin.maxMoveLoopCount = 90;

  button.addEventListener('click', () => {
    if (button.clicked) return;
    button.classList.add('clicked');
    setTimeout(() => {
      coin.sideRotationCount = Math.floor(Math.random() * 5) * 90;
      coin.maxFlipAngle = (Math.floor(Math.random() * 4) + 3) * Math.PI;
      button.clicked = true;
      flipCoin();
    }, 50);
  });

  const flipCoin = () => {
    coin.moveLoopCount = 0;
    flipCoinLoop();
  };

  const resetCoin = () => {
    coin.style.setProperty('--coin-x-multiplier', 0);
    coin.style.setProperty('--coin-scale-multiplier', 0);
    coin.style.setProperty('--coin-rotation-multiplier', 0);
    coin.style.setProperty('--shine-opacity-multiplier', 0.4);
    coin.style.setProperty('--shine-bg-multiplier', '50%');
    coin.style.setProperty('opacity', 1);
    setTimeout(() => { button.clicked = false; }, 300);
  };

  const flipCoinLoop = () => {
    coin.moveLoopCount++;
    let pct = coin.moveLoopCount / coin.maxMoveLoopCount;
    coin.angle = -coin.maxFlipAngle * Math.pow((pct - 1), 2) + coin.maxFlipAngle;

    coin.style.setProperty('--coin-y-multiplier', -11 * Math.pow(pct * 2 - 1, 4) + 11);
    coin.style.setProperty('--coin-x-multiplier', pct);
    coin.style.setProperty('--coin-scale-multiplier', pct * 0.6);
    coin.style.setProperty('--coin-rotation-multiplier', pct * coin.sideRotationCount);
    coin.style.setProperty('--front-scale-multiplier', Math.max(Math.cos(coin.angle), 0));
    coin.style.setProperty('--front-y-multiplier', Math.sin(coin.angle));
    coin.style.setProperty('--middle-scale-multiplier', Math.abs(Math.cos(coin.angle)));
    coin.style.setProperty('--middle-y-multiplier', Math.cos((coin.angle + Math.PI / 2) % Math.PI));
    coin.style.setProperty('--back-scale-multiplier', Math.max(Math.cos(coin.angle - Math.PI), 0));
    coin.style.setProperty('--back-y-multiplier', Math.sin(coin.angle - Math.PI));
    coin.style.setProperty('--shine-opacity-multiplier', 4 * Math.sin((coin.angle + Math.PI / 2) % Math.PI) - 3.2);
    coin.style.setProperty('--shine-bg-multiplier', -40 * (Math.cos((coin.angle + Math.PI / 2) % Math.PI) - 0.5) + '%');

    if (coin.moveLoopCount < coin.maxMoveLoopCount) {
      if (coin.moveLoopCount === coin.maxMoveLoopCount - 6) button.classList.add('shrink-landing');
      window.requestAnimationFrame(flipCoinLoop);
    } else {
      button.classList.add('coin-landed');
      coin.style.setProperty('opacity', 0);

      // Mini confetti burst when QR appears
      setTimeout(() => {
        confetti({
          particleCount: 40,
          spread: 50,
          origin: { y: 0.65 },
          colors: ['#c9a84c', '#ffe680', '#ffffff']
        });
      }, 200);

      setTimeout(() => {
        button.classList.remove('clicked', 'shrink-landing', 'coin-landed');
        setTimeout(() => { resetCoin(); }, 300);
      }, 3000);
    }
  };
});
</script>
</body>
</html>
